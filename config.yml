# List of valid engines
ENGINES : [ "d8", "wasmtime", "wizard" ]

# (Relative) paths to engines and engine-specific options
# Wasmtime
WASMTIME_PATH : "/wasmfxtime/target/release/wasmtime"
WASMTIME_OPTIONS : "run --allow-precompiled -W=exceptions,function-references,gc,stack-switching,total-stacks=<STACK_POOL_SIZE>"

# V8
D8_PATH : "/v8/v8/out/x64.release/d8"
D8_OPTIONS : "--experimental-wasm-wasmfx load.mjs --"

# Wizard
WIZARD_PATH : "/wizard-engine/bin/wizeng.x86-64-linux"
WIZARD_OPTIONS : "--ext:stack-switching --ext:gc --stack-size=65536 --mode=jit"

# List of benchmarks
BENCHMARKS_FIBER_C : [
    "itersum",
    "sieve",
    "state",
    "treesum",
    "c10m",
    "pi",
    "skynet",
    "scheduler",
  ]

# List of switch benchmarks
BENCHMARKS_FIBER_C_SWITCH : [
    "itersum",
    "treesum",
    "pi",
    "scheduler",
]

# Arguments for benchmarks that require arguments
BENCHMARK_ARGS : {
    "itersum": 100000000,
    "treesum": 25,
    "sieve": 2000,
    "itersum_switch": 100000000,
    "treesum_switch": 25,
}

# Wasmtime stack pool sizes for benchmarks that may do better with a different number from the default 1024 stacks
WASMTIME_STACK_POOL_SIZES : {
    "c10m": 10000,
    "sieve": 2000, # this needs to be equal to BENCHMARK_ARGS["sieve"]
    "skynet" : 6,
}
